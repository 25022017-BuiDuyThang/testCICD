name: Multi-OS Test Suite

on: [push, pull_request]

jobs:
  test-on-matrix:
    name: Test on ${{ matrix.os }}
    # Chạy trên các OS được định nghĩa trong matrix
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        # Danh sách các hệ điều hành cần kiểm thử
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build riêng module Bai4
        # -pl (project list): Chỉ định module cụ thể
        # -am (also make): Build cả các module phụ thuộc nếu có
        run: mvn clean test -pl Bai4