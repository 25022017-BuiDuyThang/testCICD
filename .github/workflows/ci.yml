name: Java CI for Bai3 Only

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Thiết lập JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build riêng module Bai3
        # -pl (project list): Chỉ định module cụ thể
        # -am (also make): Build cả các module phụ thuộc nếu có
        run: mvn -B package -pl Bai3 -am

      - name: Lưu trữ tệp .jar của Bai3
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: bai3-artifact
          # QUAN TRỌNG: Đường dẫn phải trỏ vào thư mục target của Bai3
          path: Bai3/target/*.jar