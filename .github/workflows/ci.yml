name: Java CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      #          cache: 'maven'
      - name: Build riêng module Bai6
        # -pl (project list): Chỉ định module cụ thể
        # -am (also make): Build cả các module phụ thuộc nếu có
        run: mvn clean test -pl Bai6