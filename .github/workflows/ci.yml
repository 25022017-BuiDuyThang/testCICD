name: Multi-OS Matrix Test

on: [push, pull_request]

jobs:
  test-on-matrix:
    strategy:
      # Matrix sẽ tạo ra 3 jobs chạy song song
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build riêng module Bai4
        # -pl (project list): Chỉ định module cụ thể
        # -am (also make): Build cả các module phụ thuộc nếu có
        run: mvn clean validate -pl Bai4